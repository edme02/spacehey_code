<style>
  html * {
    text-shadow: 1px 1px 2px #b3e5f3 !important;
  }

  body {
    background-image: url("https://i.ibb.co/YFjKkF5v/spacehey-dusk.png") !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    background-size: cover !important;
    background-attachment: fixed !important;
    position: relative;
    z-index: 1;
  }

  nav {
    margin: 0px 0 10px;
  }

  header {
    border: #fff;
    border-radius: 5px;
  }

  nav,
  main,
  footer {
    background-color: #22011180 !important;
    color: #ffffff !important;
    border: 2px solid #b3e5f3 !important;
    border-radius: 8px;
    box-shadow: 0px 0px 15px #627e86;
    padding: 15px;
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
  }

  /* top nav bar */
  nav *,
  nav ul,
  nav li,
  nav div {
    background: transparent !important;
    background-color: transparent !important;
  }

  nav a,
  main a,
  footer a {
    color: #fff !important;
  }

  nav .links {
    padding: 3.5px 0px;
  }

  .logo {
    -webkit-filter: drop-shadow(1px 1px 2px #b3e5f3) !important;
    filter: drop-shadow(1px 1px 2px #b3e5f3) !important;
  }

  nav .links li:not(:last-child)::after,
  footer .links li:not(:last-child)::after {
    content: " § ";
    color: #b3e5f3;
  }

  /* left details pane */
  @-webkit-keyframes tracking-in-expand {
    0% {
      letter-spacing: -0.5em;
      opacity: 0;
    }
    40% {
      opacity: 0.6;
    }
    100% {
      opacity: 1;
    }
  }
  @keyframes tracking-in-expand {
    0% {
      letter-spacing: -0.5em;
      opacity: 0;
    }
    40% {
      opacity: 0.6;
    }
    100% {
      opacity: 1;
    }
  }
  .profile h1 {
    -webkit-animation: tracking-in-expand 1.5s
      cubic-bezier(0.215, 0.61, 0.355, 1) both;
    animation: tracking-in-expand 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) both;
  }
  .pfp-fallback {
    -webkit-filter: drop-shadow(0px 0px 7px #fff) !important;
    filter: drop-shadow(0px 0px 7px #fff) !important;
  }
  .online {
    color: #62ffd0;
  }
  .online img {
    -webkit-filter: drop-shadow(1px 1px 2px #b3e5f3) brightness(0)
      saturate(100%) invert(87%) sepia(38%) saturate(635%) hue-rotate(88deg)
      brightness(106%) contrast(102%) !important;
    filter: drop-shadow(1px 1px 2px #b3e5f3) brightness(0) saturate(100%)
      invert(87%) sepia(38%) saturate(635%) hue-rotate(88deg) brightness(106%)
      contrast(102%) !important;
  }

  .profile .contact,
  .profile .url-info,
  .profile .table-section,
  .report-box,
  .setting-section,
  .home-actions {
    width: 100%;
    border: 2px solid #769097;
    margin: 10px 0;
  }
  .profile .contact .heading,
  .profile .table-section .heading,
  .report-box .heading,
  .setting-section .heading,
  .home-actions .heading {
    background: #769097;
    color: white;
    padding: 2px 7px;
  }

  .details-table td:first-child {
    background: #8fabb3;
    color: #ffffff;
  }
  .details-table td {
    background: #a1bcc4;
  }

  /* right details pane */
  .friends * {
    color: #fff !important;
  }

  .profile .blurbs .heading,
  .profile .friends .heading {
    background: #769097;
    color: #a1bcc4;
  }

  .profile .blurbs .section h4 {
    color: #bb85f9;
    text-shadow: 1px 1px 1px #fff !important;
  }

  .profile .blurbs .heading,
  .profile .friends .heading {
    color: #fff;
    text-shadow: 1px 1px 2px #ab81cd !important;
  }

  /* pane blur */
  .noise-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
    opacity: 0.01;
    z-index: 2;
    pointer-events: none;
  }
</style>

<div class="noise-overlay"></div>
